<div id="ytr-root" style="padding:20px 24px;max-width:1500px;margin:0 auto">
  <div style="margin-bottom:16px">
    <h1 style="font-size:20px;font-weight:700;margin:0 0 4px">Research</h1>
    <p style="color:var(--text-secondary);font-size:13px;margin:0">
      Drop a YouTube link. It transcribes from captions and writes a structured breakdown into your
      notes vault under <code>research/&lt;topic&gt;</code>. Captions-only (v1): the video must have captions.
    </p>
  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg-panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px">
    <input id="ytr-url" class="input" type="text" placeholder="https://www.youtube.com/watch?v=..." style="flex:1;min-width:280px">

    <div style="display:flex;gap:4px;background:var(--bg-input,rgba(255,255,255,0.04));border:1px solid var(--border-dim);border-radius:var(--radius);padding:3px">
      <button type="button" class="ytr-depth" data-depth="single" data-active="1" style="cursor:pointer;padding:6px 12px;border:none;border-radius:5px;font-size:12px;font-weight:600;background:var(--accent,#60a5fa);color:#fff">Single pass</button>
      <button type="button" class="ytr-depth" data-depth="deep" style="cursor:pointer;padding:6px 12px;border:none;border-radius:5px;font-size:12px;font-weight:600;background:transparent;color:var(--text-secondary)">Deep dive</button>
    </div>

    <select id="ytr-provider" class="input" title="Which AI provider writes the breakdown. Defaults to your saved assistant provider." style="max-width:170px">
      <option value="">Default provider</option>
      <option value="anthropic">Anthropic</option>
      <option value="openai">OpenAI</option>
      <option value="openrouter">OpenRouter</option>
      <option value="ollama">Ollama</option>
    </select>

    <select id="ytr-model" class="input" title="Which model writes the breakdown. Blank uses the provider's default." style="max-width:220px">
      <option value="">Default model</option>
    </select>

    <input id="ytr-dest" class="input" list="ytr-dest-list" placeholder="_inbox (topic folder)" title="Research topic folder. Blank files under _inbox." style="max-width:220px">
    <datalist id="ytr-dest-list"></datalist>

    <button id="ytr-run" class="btn btn-primary">Run</button>
  </div>

  <div style="display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start">
    <div id="ytr-list" style="display:flex;flex-direction:column;gap:8px"></div>
    <div id="ytr-detail" style="background:var(--bg-panel);border:1px solid var(--border-dim);border-radius:var(--radius);min-height:420px;padding:18px"></div>
  </div>

  <style>
    @keyframes ytr-spin { to { transform: rotate(360deg); } }
    .ytr-spin { animation: ytr-spin 0.8s linear infinite; }
    #ytr-detail table { border-collapse:collapse; margin:10px 0; font-size:13px; }
    #ytr-detail th, #ytr-detail td { border:1px solid var(--border-dim); padding:6px 10px; text-align:left; }
    #ytr-detail th { background:var(--bg-input,rgba(255,255,255,0.04)); }
    #ytr-detail h1 { font-size:20px; margin:16px 0 8px; }
    #ytr-detail h2 { font-size:16px; margin:18px 0 6px; border-bottom:1px solid var(--border-dim); padding-bottom:4px; }
    #ytr-detail h3 { font-size:14px; margin:12px 0 4px; }
    #ytr-detail pre { background:var(--bg-input,rgba(255,255,255,0.04)); padding:10px 12px; border-radius:6px; overflow-x:auto; }
    #ytr-detail code { font-family:var(--font-mono); font-size:12px; }
    #ytr-detail a { color:var(--accent,#60a5fa); }
  </style>
</div>
