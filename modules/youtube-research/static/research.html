<div id="yt-root" style="max-width:900px;margin:0 auto;padding:20px">
  <div style="margin-bottom:6px">
    <h1 style="font-size:20px;margin:0">YouTube Research</h1>
    <div style="font-size:12px;opacity:0.65;margin-top:4px">
      Paste a YouTube link. The video is transcribed from its captions, broken down by your
      configured AI model, and filed into your notes vault under <code>research/&lt;topic&gt;</code>.
      Captions-only (v1): the video must have captions or subtitles.
    </div>
  </div>

  <div style="background:var(--bg-panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:14px;margin:14px 0">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="yt-url" class="input" placeholder="https://www.youtube.com/watch?v=… or 11-char video id" style="flex:3;min-width:280px">
      <button id="yt-run" class="btn btn-primary">Research</button>
    </div>
    <div id="yt-status" style="margin-top:10px;font-size:13px;min-height:18px"></div>
  </div>

  <div id="yt-result" style="display:none;background:var(--bg-panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:14px;margin:14px 0">
    <div id="yt-result-head" style="margin-bottom:8px"></div>
    <pre id="yt-result-body" style="white-space:pre-wrap;word-wrap:break-word;font-family:var(--font-mono);font-size:12px;line-height:1.5;margin:0;max-height:60vh;overflow:auto"></pre>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin:18px 0 8px">
    <h3 style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;opacity:0.6;margin:0">Recent</h3>
    <button id="yt-refresh" class="btn btn-sm btn-ghost">Refresh</button>
  </div>
  <div id="yt-jobs"></div>
</div>
