<div id="af-root" style="padding:20px 24px;max-width:1500px;margin:0 auto;display:flex;flex-direction:column;box-sizing:border-box">
  <div style="margin-bottom:12px;flex-shrink:0">
    <h1 style="font-size:20px;font-weight:700;margin:0 0 4px">Agent Fleet</h1>
    <p style="color:var(--text-secondary);font-size:13px;margin:0">
      A managed fleet of LangGraph agents, operated the way AgeniusDesk operates n8n instances:
      pick an agent, run it, watch every step, replay any past run.
    </p>
  </div>

  <div id="lg-catalog" style="display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0;margin-bottom:12px"></div>

  <div id="lg-composer" style="display:none;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg-panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;flex-shrink:0">
    <select id="lg-target" class="input" title="What to act on. Defaults to the most recent error AgeniusDesk has collected."
      style="min-width:240px;max-width:420px">
      <option value="">Most recent error</option>
    </select>
    <input id="lg-prompt" class="input" type="text" placeholder="Optional: free-form request (overrides the picker)" style="flex:1;min-width:260px" />
    <button id="lg-run" class="btn btn-primary">Run agent</button>
  </div>

  <div id="lg-list" style="display:flex;gap:8px;overflow-x:auto;flex-shrink:0;margin-bottom:12px;padding-bottom:2px"></div>
  <div id="lg-detail" style="background:var(--bg-panel);border:1px solid var(--border-dim);border-radius:var(--radius);padding:18px;overflow-y:auto;min-height:300px"></div>

  <style>
    @keyframes lg-spin { to { transform: rotate(360deg); } }
    .lg-spin { animation: lg-spin 0.8s linear infinite; }
    @keyframes lg-pulse { 0%,100% { opacity:1 } 50% { opacity:.5 } }
    .lg-node-cur rect { animation: lg-pulse 1.1s ease-in-out infinite; }
    .lg-node-cur { filter: drop-shadow(0 0 5px rgba(56,189,248,0.75)); }
    .lg-agent-card { cursor:pointer; flex:0 0 auto; width:190px; background:var(--bg-panel); border:1px solid var(--border-dim); border-radius:var(--radius); padding:7px 10px; transition:border-color .12s; }
    .lg-agent-card:hover { border-color:var(--text-muted); }
    .lg-card-head { display:flex; align-items:center; gap:6px; }
    .lg-card-exp { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:0 1px; font-size:11px; line-height:1; }
    .lg-card-exp:hover { color:var(--text-primary); }
    .lg-card-body { margin-top:7px; padding-top:7px; border-top:1px solid var(--border-dim); }
    .lg-step { display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border-dim); }
    .lg-step:last-child { border-bottom:none; }
    .lg-chip { font-family:var(--font-mono);font-size:12px;background:var(--bg-void);border:1px solid var(--border-dim);border-radius:5px;padding:4px 8px;word-break:break-all; }
    #lg-detail details > summary { cursor:pointer;font-size:11px;color:var(--text-muted); }
    #lg-detail details pre { background:var(--bg-void);padding:8px 10px;border-radius:6px;overflow-x:auto;font-size:11px;white-space:pre-wrap;word-break:break-all;margin:6px 0 0; }
    #lg-triage h1 { font-size:18px; margin:14px 0 8px; }
    #lg-triage h2 { font-size:15px; margin:16px 0 6px; border-bottom:1px solid var(--border-dim); padding-bottom:4px; }
    #lg-triage code { font-family:var(--font-mono); font-size:12px; }
    #lg-triage a { color:var(--accent,#60a5fa); }
    #lg-proposal h2 { font-size:15px; margin:10px 0 6px; }
  </style>
</div>
